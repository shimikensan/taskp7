<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pro Tasks VB Design v1.2.2</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4f46e5">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; transition: background-color 0.3s; }
        .task-done { text-decoration: line-through; opacity: 0.5; }
        .priority-high { border-left: 6px solid #ef4444; }
        .priority-medium { border-left: 6px solid #f59e0b; }
        .priority-low { border-left: 6px solid #10b981; }
        .dark-mode { background-color: #0f172a; color: #f8fafc; }
        .dark-mode .bg-card { background-color: #1e293b; color: #ffffff; }
        .dark-mode input, .dark-mode select { background-color: #334155; color: white; border-color: #475569; }
        .animate-pop { animation: pop 0.2s ease-out; }
        @keyframes pop { 0% { transform: scale(0.98); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        * { border-radius: 0 !important; }
        .alarm-active { animation: shake 0.5s infinite; background-color: #ef4444 !important; color: white !important; }
        @keyframes shake { 0% { transform: translate(1px, 1px); } 20% { transform: translate(-3px, 0px); } 40% { transform: translate(3px, 2px); } 60% { transform: translate(-3px, 1px); } 80% { transform: translate(3px, 1px); } 100% { transform: translate(1px, -2px); } }
    </style>
</head>
<body class="bg-gray-100 min-h-screen pb-24" onclick="initAudio()">

    <div class="max-w-md mx-auto md:max-w-2xl shadow-2xl md:mt-10 overflow-hidden bg-white bg-card relative border dark:border-slate-800">
        <div class="bg-gradient-to-r from-indigo-600 to-purple-700 p-6 text-white flex justify-between items-center shadow-lg">
            <div>
                <h1 class="text-2xl font-black tracking-tight uppercase leading-none">Nhiệm Vụ 📋</h1>
                <p id="date-display" class="text-[10px] opacity-80 capitalize font-bold tracking-widest mt-1"></p>
            </div>
            <div class="flex gap-1">
                <button onclick="toggleDashboard()" class="p-3 bg-white/10 hover:bg-white/30 transition"><i class="fas fa-chart-pie"></i></button>
                <button onclick="toggleTrash()" class="p-3 bg-white/10 hover:bg-white/30 transition"><i class="fas fa-trash-alt"></i></button>
                <button onclick="toggleDarkMode()" class="p-3 bg-white/10 hover:bg-white/30 transition"><i id="darkIcon" class="fas fa-moon"></i></button>
            </div>
        </div>

        <div id="alarmBanner" class="hidden p-2 z-50">
            <button onclick="stopAlarm()" class="w-full py-4 bg-red-600 text-white font-black uppercase text-sm shadow-xl alarm-active">
                <i class="fas fa-exclamation-triangle mr-2"></i> TẮT CHUÔNG (NHIỆM VỤ QUÁ HẠN)
            </button>
        </div>

        <div id="dashboardSection" class="hidden p-6 border-b bg-gray-50 dark:bg-slate-800/50 animate-pop">
            <h2 class="text-[10px] font-black uppercase text-gray-400 mb-4 tracking-[0.2em] text-center">Thống kê tiến độ</h2>
            <div class="w-44 h-44 mx-auto mb-6"><canvas id="taskChart"></canvas></div>
            <div class="space-y-2 max-w-xs mx-auto">
                <div class="grid grid-cols-2 gap-2">
                    <button onclick="exportBackup()" class="bg-green-600 text-white py-3 text-[10px] font-black uppercase tracking-widest"><i class="fas fa-file-export mr-1"></i> Sao lưu</button>
                    <label class="flex items-center justify-center bg-orange-500 text-white py-3 text-[10px] font-black uppercase cursor-pointer tracking-widest">
                        <i class="fas fa-file-import mr-1"></i> Khôi phục
                        <input type="file" id="importFile" class="hidden" onchange="importBackup(event)" accept=".json">
                    </label>
                </div>
                <button onclick="checkUpdateManual()" class="w-full bg-indigo-500 text-white py-3 text-[10px] font-black uppercase tracking-widest"><i class="fas fa-sync-alt mr-2"></i> Kiểm tra cập nhật phần mềm</button>
            </div>
        </div>

        <div id="trashSection" class="hidden p-6 border-b bg-red-50 dark:bg-red-900/10 animate-pop">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-[10px] font-black uppercase text-red-500 tracking-[0.2em]">Danh sách Thùng rác</h2>
                <button onclick="emptyTrash()" class="text-[9px] font-bold text-red-600 underline uppercase">Dọn sạch</button>
            </div>
            <div id="trashList" class="max-h-48 overflow-y-auto text-xs space-y-2"></div>
        </div>

        <div id="updateBanner" class="hidden bg-yellow-400 text-black p-3 text-center text-xs font-bold animate-pulse cursor-pointer" onclick="updateApp()">✨ PHIÊN BẢN MỚI ĐÃ SẴN SÀNG! NHẤN ĐỂ CẬP NHẬT.</div>

        <div id="inputForm" class="hidden p-5 border-b space-y-3 bg-indigo-50 dark:bg-slate-700/30 animate-pop">
            <input type="hidden" id="editId">
            <input type="text" id="taskInput" placeholder="Nội dung nhiệm vụ..." class="w-full border px-4 py-3 outline-none focus:ring-2 focus:ring-indigo-500 font-semibold text-gray-800 dark:text-white">
            <input type="text" id="assigneeInput" placeholder="Người thực hiện" class="w-full border px-4 py-2 outline-none text-sm font-medium">
            <div class="grid grid-cols-2 gap-3">
                <div class="flex flex-col"><label class="text-[9px] text-gray-500 font-black uppercase mb-1">Bắt đầu</label><input type="datetime-local" id="timeInput" class="border px-4 py-2 text-xs"></div>
                <div class="flex flex-col"><label class="text-[9px] text-red-500 font-black uppercase mb-1 text-red-500 font-bold">Hạn chót</label><input type="datetime-local" id="deadlineInput" class="border px-4 py-2 text-xs border-red-200"></div>
            </div>
            <button onclick="handleTask()" id="btnAction" class="w-full bg-indigo-600 text-white font-black py-3 shadow-lg text-sm uppercase tracking-widest">Lưu nhiệm vụ</button>
        </div>

        <div class="bg-white dark:bg-slate-900 p-3 border-b space-y-3">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-2">
                <div class="relative">
                    <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-xs"></i>
                    <input type="text" id="searchInput" oninput="render()" placeholder="Tìm kiếm..." class="w-full border pl-9 pr-4 py-2 text-xs outline-none focus:border-indigo-500 dark:bg-slate-800">
                </div>
                <div class="flex items-center gap-1 border px-2 bg-gray-50 dark:bg-slate-800">
                    <span class="text-[9px] font-black uppercase text-gray-400">Ngày:</span>
                    <input type="date" id="dateFilter" onchange="render()" class="w-full bg-transparent text-xs py-1 outline-none">
                    <button onclick="resetDateFilter()" class="text-indigo-600 font-black text-[9px] uppercase ml-1">Xóa</button>
                </div>
            </div>
            <div class="flex bg-gray-100 dark:bg-slate-800 p-1 shadow-inner">
                <button onclick="setFilter('all')" id="f-all" class="flex-1 py-2 text-[9px] font-black bg-indigo-600 text-white uppercase tracking-tighter">Tất cả</button>
                <button onclick="setFilter('active')" id="f-active" class="flex-1 py-2 text-[9px] font-black text-gray-400 uppercase tracking-tighter">Đang làm</button>
                <button onclick="setFilter('completed')" id="f-completed" class="flex-1 py-2 text-[9px] font-black text-gray-400 uppercase tracking-tighter">Đã xong</button>
            </div>
        </div>

        <div id="taskList" class="min-h-[400px] max-h-[60vh] overflow-y-auto divide-y dark:divide-slate-700"></div>

        <div class="p-4 bg-gray-50 dark:bg-slate-900 border-t flex flex-col items-center gap-1">
            <p id="taskCount" class="text-[10px] font-black text-gray-400 uppercase tracking-widest">0 NHIỆM VỤ</p>
            <div class="flex items-center gap-2">
                <span class="text-[11px] font-black text-indigo-500 tracking-widest uppercase">© VB Design</span>
                <span class="text-[8px] font-bold text-gray-400 bg-gray-200 dark:bg-slate-800 px-1.5 py-0.5 uppercase">v1.2.2</span>
            </div>
        </div>
    </div>

    <button onclick="toggleForm()" class="fixed bottom-8 right-8 w-16 h-16 bg-indigo-600 text-white shadow-2xl flex items-center justify-center text-2xl z-50 ring-4 ring-white dark:ring-slate-800 active:scale-90 transition-transform"><i class="fas fa-plus" id="fabIcon"></i></button>

    <audio id="alarmSound" preload="auto" loop><source src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" type="audio/mpeg"></audio>

    <script>
        let tasks = JSON.parse(localStorage.getItem('todo_pro_final')) || [];
        let trash = JSON.parse(localStorage.getItem('todo_trash')) || [];
        let currentStatusFilter = 'all';
        let isDarkMode = localStorage.getItem('dark_mode') === 'true';
        let myChart = null;
        let audioInitialized = false;
        let swRegistration = null;

        function initAudio() {
            if (audioInitialized) return;
            const sound = document.getElementById('alarmSound');
            sound.play().then(() => { sound.pause(); sound.currentTime = 0; audioInitialized = true; }).catch(() => {});
        }

        if (isDarkMode) document.body.classList.add('dark-mode');
        document.getElementById('date-display').innerText = new Date().toLocaleDateString('vi-VN', {weekday:'long', day:'numeric', month:'long'});

        // SW Logic
        let newWorker;
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js').then(reg => {
                swRegistration = reg;
                reg.addEventListener('updatefound', () => {
                    newWorker = reg.installing;
                    newWorker.addEventListener('statechange', () => {
                        if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                            document.getElementById('updateBanner').classList.remove('hidden');
                        }
                    });
                });
            });
        }

        function checkUpdateManual() {
            if (swRegistration) {
                alert("Đang kiểm tra từ máy chủ...");
                swRegistration.update().then(() => {
                    setTimeout(() => {
                        if (document.getElementById('updateBanner').classList.contains('hidden')) alert("Phiên bản đã mới nhất.");
                    }, 2000);
                });
            }
        }

        function updateApp() { if (newWorker) newWorker.postMessage({ action: 'skipWaiting' }); window.location.reload(); }

        function toggleDarkMode() {
            isDarkMode = !isDarkMode;
            document.body.classList.toggle('dark-mode');
            localStorage.setItem('dark_mode', isDarkMode);
            renderChart();
        }

        function toggleDashboard() {
            document.getElementById('trashSection').classList.add('hidden');
            const dash = document.getElementById('dashboardSection');
            dash.classList.toggle('hidden');
            if(!dash.classList.contains('hidden')) renderChart();
        }

        function toggleTrash() {
            document.getElementById('dashboardSection').classList.add('hidden');
            const trashSec = document.getElementById('trashSection');
            trashSec.classList.toggle('hidden');
            if(!trashSec.classList.contains('hidden')) renderTrash();
        }

        function toggleForm() {
            const form = document.getElementById('inputForm');
            const isHidden = form.classList.toggle('hidden');
            document.getElementById('fabIcon').className = isHidden ? 'fas fa-plus' : 'fas fa-minus';
            if (isHidden) resetForm();
        }

        function handleTask() {
            const text = document.getElementById('taskInput').value;
            if (!text) return alert("Vui lòng nhập nội dung!");
            const id = document.getElementById('editId').value;
            const taskData = {
                id: id ? parseInt(id) : Date.now(),
                text, assignee: document.getElementById('assigneeInput').value,
                time: document.getElementById('timeInput').value,
                deadline: document.getElementById('deadlineInput').value,
                priority: document.getElementById('priorityInput').value || 'low',
                completed: false, notified: false
            };
            if (id) {
                const idx = tasks.findIndex(t => t.id == id);
                if (idx !== -1) tasks[idx] = { ...tasks[idx], ...taskData };
            } else { tasks.unshift(taskData); }
            saveAndRender(); toggleForm(); resetForm();
        }

        function render() {
            const list = document.getElementById('taskList');
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const dateVal = document.getElementById('dateFilter').value;
            list.innerHTML = '';
            
            let filtered = tasks.filter(t => {
                const matchesSearch = t.text.toLowerCase().includes(searchTerm) || (t.assignee && t.assignee.toLowerCase().includes(searchTerm));
                if (!matchesSearch) return false;
                if (dateVal) {
                    const taskDate = t.time ? t.time.split('T')[0] : (t.deadline ? t.deadline.split('T')[0] : null);
                    if (taskDate !== dateVal) return false;
                }
                if (currentStatusFilter === 'active' && t.completed) return false;
                if (currentStatusFilter === 'completed' && !t.completed) return false;
                return true;
            });

            filtered.forEach(task => {
                const overdue = isOverdue(task.deadline) && !task.completed;
                const div = document.createElement('div');
                div.className = `p-5 priority-${task.priority} flex items-start gap-4 hover:bg-gray-50 dark:hover:bg-slate-800/50 transition animate-pop border-b dark:border-slate-700`;
                div.innerHTML = `
                    <input type="checkbox" ${task.completed ? 'checked' : ''} onchange="toggleTask(${task.id})" class="mt-1 w-6 h-6 accent-indigo-600 shrink-0">
                    <div class="flex-1 min-w-0">
                        <div class="${task.completed ? 'task-done text-gray-400' : 'font-bold text-gray-800 dark:text-gray-100'} text-sm leading-tight">
                            ${task.text} ${overdue ? '<span class="ml-2 text-[8px] bg-red-600 text-white px-2 py-0.5 font-black uppercase">Quá hạn</span>' : ''}
                        </div>
                        <div class="flex flex-col gap-1 mt-2 text-[9px] uppercase font-bold text-gray-400">
                            <span><i class="fas fa-user-circle mr-1 text-[8px]"></i>${task.assignee || '---'}</span>
                            <span class="text-blue-500 font-medium"><i class="fas fa-play mr-1 text-[8px]"></i>Bắt đầu: ${task.time ? new Date(task.time).toLocaleString('vi-VN') : '---'}</span>
                            <span class="${overdue ? 'text-red-600 font-black' : 'text-red-400'}"><i class="fas fa-hourglass-end mr-1 text-[8px]"></i>Hạn chót: ${task.deadline ? new Date(task.deadline).toLocaleString('vi-VN') : '---'}</span>
                        </div>
                    </div>
                    <div class="flex gap-1"><button onclick="editTask(${task.id})" class="text-indigo-400 p-2"><i class="fas fa-pen"></i></button><button onclick="confirmDelete(${task.id}, '${task.text}')" class="text-red-300 p-2"><i class="fas fa-trash"></i></button></div>
                `;
                list.appendChild(div);
            });
            document.getElementById('taskCount').innerText = `${filtered.length} NHIỆM VỤ`;
            renderChart();
        }

        function confirmDelete(id, text) { if (confirm(`Xóa nhiệm vụ:\n"${text}"?\n(Sẽ vào thùng rác)`)) moveToTrash(id); }
        function moveToTrash(id) { const idx = tasks.findIndex(t => t.id === id); if (idx !== -1) { trash.unshift(tasks.splice(idx, 1)[0]); saveAndRender(); if(!document.getElementById('trashSection').classList.contains('hidden')) renderTrash(); } }
        
        function renderTrash() {
            const tList = document.getElementById('trashList');
            tList.innerHTML = trash.length === 0 ? '<div class="text-gray-400 italic text-[10px]">Trống</div>' : '';
            trash.forEach((t, i) => {
                const div = document.createElement('div');
                div.className = "flex justify-between items-center p-2 bg-white dark:bg-slate-700 border dark:border-slate-600 mb-1 animate-pop";
                div.innerHTML = `<span class="truncate mr-2 text-[10px] text-gray-600 dark:text-gray-300">${t.text}</span>
                    <div class="flex gap-2 shrink-0">
                        <button onclick="restoreTask(${i})" class="text-green-600 font-bold uppercase text-[8px]">Phục hồi</button>
                        <button onclick="permanentDelete(${i})" class="text-red-500 font-bold uppercase text-[8px]">Xóa hẳn</button>
                    </div>`;
                tList.appendChild(div);
            });
        }

        function restoreTask(index) { tasks.unshift(trash.splice(index, 1)[0]); saveAndRender(); renderTrash(); }
        function permanentDelete(index) { if(confirm("Dữ liệu này sẽ mất vĩnh viễn. Tiếp tục?")) { trash.splice(index, 1); saveAndRender(); renderTrash(); } }
        function emptyTrash() { if(trash.length > 0 && confirm("Làm trống thùng rác?")) { trash = []; saveAndRender(); renderTrash(); } }

        function startAlarm() { if (!audioInitialized) return; const sound = document.getElementById('alarmSound'); sound.play().then(() => { document.getElementById('alarmBanner').classList.remove('hidden'); }).catch(() => {}); }
        function stopAlarm() { const sound = document.getElementById('alarmSound'); sound.pause(); sound.currentTime = 0; document.getElementById('alarmBanner').classList.add('hidden'); tasks.forEach(t => { if(t.deadline && !t.completed && isOverdue(t.deadline)) t.notified = true; }); saveAndRender(); }
        function isOverdue(deadline) { return deadline ? new Date(deadline) < new Date() : false; }
        function saveAndRender() { localStorage.setItem('todo_pro_final', JSON.stringify(tasks)); localStorage.setItem('todo_trash', JSON.stringify(trash)); render(); }
        function toggleTask(id) { const idx = tasks.findIndex(t => t.id == id); tasks[idx].completed = !tasks[idx].completed; if(tasks[idx].completed) stopAlarm(); saveAndRender(); }
        function editTask(id) {
            const task = tasks.find(t => t.id == id); if (!task) return;
            const form = document.getElementById('inputForm'); if(form.classList.contains('hidden')) { form.classList.remove('hidden'); document.getElementById('fabIcon').className = 'fas fa-minus'; }
            document.getElementById('editId').value = task.id; document.getElementById('taskInput').value = task.text; document.getElementById('assigneeInput').value = task.assignee || ''; document.getElementById('timeInput').value = task.time || ''; document.getElementById('deadlineInput').value = task.deadline || ''; document.getElementById('priorityInput').value = task.priority || 'low';
            document.getElementById('btnAction').innerText = 'CẬP NHẬT NHIỆM VỤ'; window.scrollTo({top: 0, behavior: 'smooth'});
        }
        function resetForm() { document.getElementById('editId').value = ''; ['taskInput','assigneeInput','timeInput','deadlineInput'].forEach(i => document.getElementById(i).value = ''); document.getElementById('priorityInput').value = 'low'; document.getElementById('btnAction').innerText = 'LƯU NHIỆM VỤ'; }
        function resetDateFilter() { document.getElementById('dateFilter').value = ''; render(); }
        function setFilter(f) { currentStatusFilter = f; document.querySelectorAll('[id^="f-"]').forEach(b => b.className = 'flex-1 py-2 text-[9px] font-black text-gray-400 uppercase tracking-tighter'); document.getElementById('f-'+f).className = 'flex-1 py-2 text-[9px] font-black bg-indigo-600 text-white uppercase tracking-tighter'; render(); }
        function renderChart() { const canvas = document.getElementById('taskChart'); if(!canvas || document.getElementById('dashboardSection').classList.contains('hidden')) return; const onTime = tasks.filter(t => t.completed || !isOverdue(t.deadline)).length; const overdue = tasks.filter(t => !t.completed && isOverdue(t.deadline)).length; if (myChart) myChart.destroy(); myChart = new Chart(canvas, { type: 'doughnut', data: { labels: ['Đúng hạn', 'Quá hạn'], datasets: [{ data: [onTime, overdue], backgroundColor: ['#4f46e5', '#ef4444'], borderWidth: 0 }] }, options: { responsive: true, plugins: { legend: { display: false } }, cutout: '75%' } }); }
        function exportBackup() { const dataStr = JSON.stringify(tasks, null, 2); const dataUri = 'data:application/json;charset=utf-8,' + encodeURIComponent(dataStr); const link = document.createElement('a'); link.setAttribute('href', dataUri); link.setAttribute('download', `VB_Backup_${new Date().toISOString().slice(0,10)}.json`); link.click(); }
        function importBackup(e) { const file = e.target.files[0]; if(!file) return; const r = new FileReader(); r.onload = (ev) => { try { tasks = JSON.parse(ev.target.result); saveAndRender(); location.reload(); } catch(err) { alert("Lỗi file!"); } }; r.readAsText(file); }

        setInterval(() => {
            let hasNewOverdue = tasks.some(t => t.deadline && !t.completed && !t.notified && isOverdue(t.deadline));
            if (hasNewOverdue) startAlarm();
        }, 15000);

        render();
    </script>
</body>
</html>
